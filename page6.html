<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date Confirmed ❤️</title>
    <link rel="stylesheet" href="page6.css">
</head>
<body>

<div class="background"></div>

<div class="card">

    <div class="emoji">🎉</div>

    <h1>Date Confirmed ❤️</h1>

    <div id="result" class="result"></div>

    <p class="message">I can't wait to see you ❤️✨</p>

    <p class="note">👇🏻Bunga ham bir xil qilib kiriting</p>

    <div class="buttons">

        <button class="primary"
        onclick="window.location.href='https://docs.google.com/forms/d/e/1FAIpQLSeIj0XGA2cAIo7fSUy0z6PV-N05NtMcAja5AuSl2ASLq-mJXQ/viewform?usp=publish-editor'">
            💕 Fill the Date Form
        </button>

        <button class="secondary" onclick="location.href='index.html'">
            🔄 Start Again
        </button>

    </div>

</div>

<script>
const food = localStorage.getItem("food") || "Not selected";
const date = localStorage.getItem("date") || "Not selected";
const time = localStorage.getItem("time") || "Not selected";

document.getElementById("result").innerHTML = `
    <div class="item">🍽 Food: <b>${food}</b></div>
    <div class="item">📅 Date: <b>${date}</b></div>
    <div class="item">⏰ Time: <b>${time}</b></div>
`;
</script>

</body>
</html>
